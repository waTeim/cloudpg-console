<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CloudPG Console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (UMD, production). Vendored at build time from
       node_modules into vendor/. Run `make build` to populate. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>

  <!-- Renderer modules. JSX is pre-compiled by scripts/build.js (esbuild,
       classic transform); load order matters because each file publishes
       to window.* and later files depend on earlier ones. -->
  <script src="out/backend.js"></script>
  <script src="out/tweaks-panel.js"></script>
  <script src="out/icons.js"></script>
  <script src="out/sidebar.js"></script>
  <script src="out/session.js"></script>
  <script src="out/palette.js"></script>
  <script src="out/app.js"></script>
</body>
</html>
